<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zendesk Tab Manager Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 340px;
      padding: 16px;
      color: #1a1a1a;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 8px;
    }
    p {
      font-size: 12px;
      line-height: 1.5;
      color: #444;
    }
    textarea {
      width: 100%;
      height: 80px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 12px;
      padding: 6px;
    }
    button {
      margin-top: 10px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #0d5c5c;
      min-height: 16px;
    }
    code {
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Zendesk Tab Manager</h1>
  <p>
    Enter your Zendesk domain(s), one per line. Left-clicking a matching link
    will reuse an existing tab instead of opening a new one. Example:
    <code>yourcompany.zendesk.com</code> or <code>*.zendesk.com</code> to
    match any subdomain.
  </p>
  <textarea id="domains" placeholder="yourcompany.zendesk.com"></textarea>
  <br />
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
